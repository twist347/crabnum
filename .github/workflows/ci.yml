name: Build (Ubuntu LTS)

on:
  push:
  pull_request:

jobs:
  build-gcc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v27

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-gcc-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-gcc-${{ runner.os }}-

      - name: Configure
        run: nix develop --command cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: nix develop --command cmake --build build --parallel

      - name: Test
        run: nix develop --command ctest --test-dir build --output-on-failure --no-tests=error

  build-clang:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v27

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-clang-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-clang-${{ runner.os }}-

      - name: Configure
        run: nix develop .#clang --command cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: nix develop .#clang --command cmake --build build --parallel

      - name: Test
        run: nix develop .#clang --command ctest --test-dir build --output-on-failure --no-tests=error